<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaires de Contact & Devis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
            --gray: #f3f4f6;
            --text: #1f2937;
            --border: #d1d5db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .forms-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .form-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .form-card h2 {
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-card h2::before {
            font-size: 1.3em;
        }

        #contact h2::before {
            content: "✉️";
        }

        #devis h2::before {
            content: "📋";
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 0.95em;
            display: none;
        }

        .alert.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid var(--success);
        }

        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid var(--error);
        }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            opacity: 0.9;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .forms-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            header h1 {
                font-size: 1.8em;
            }
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📞 Nous Contacter</h1>
            <p>Remplissez l'un des formulaires ci-dessous</p>
        </header>

        <div class="forms-grid">
            <!-- Formulaire de Contact -->
            <form id="contact" class="form-card">
                <h2>Formulaire de Contact</h2>

                <div class="form-group">
                    <label for="contact-nom">Nom *</label>
                    <input type="text" id="contact-nom" name="nom" required>
                </div>

                <div class="form-group">
                    <label for="contact-prenom">Prénom *</label>
                    <input type="text" id="contact-prenom" name="prenom" required>
                </div>

                <div class="form-group">
                    <label for="contact-tel">Téléphone *</label>
                    <input type="tel" id="contact-tel" name="telephone" required>
                </div>

                <div class="form-group">
                    <label for="contact-email">Email *</label>
                    <input type="email" id="contact-email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="contact-message">Message *</label>
                    <textarea id="contact-message" name="message" required></textarea>
                </div>

                <div class="loading" id="contact-loading">
                    <div class="spinner"></div>
                    Envoi en cours...
                </div>

                <button type="submit" id="contact-btn">Envoyer le message</button>

                <div class="alert" id="contact-alert"></div>
            </form>

            <!-- Formulaire de Devis -->
            <form id="quote" class="form-card">
                <h2>Demande de Devis</h2>

                <div class="form-group">
                    <label for="quote-nom">Nom *</label>
                    <input type="text" id="quote-nom" name="nom" required>
                </div>

                <div class="form-group">
                    <label for="quote-prenom">Prénom *</label>
                    <input type="text" id="quote-prenom" name="prenom" required>
                </div>

                <div class="form-group">
                    <label for="quote-tel">Téléphone *</label>
                    <input type="tel" id="quote-tel" name="telephone" required>
                </div>

                <div class="form-group">
                    <label for="quote-email">Email *</label>
                    <input type="email" id="quote-email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="quote-message">Description du projet *</label>
                    <textarea id="quote-message" name="message" placeholder="Décrivez votre projet, vos besoins, votre budget estimé..." required></textarea>
                </div>

                <div class="loading" id="quote-loading">
                    <div class="spinner"></div>
                    Envoi en cours...
                </div>

                <button type="submit" id="quote-btn">Demander un devis</button>

                <div class="alert" id="quote-alert"></div>
            </form>
        </div>

        <footer>
            <p>© 2024 - Tous droits réservés | Les informations seront envoyées via Gmail</p>
        </footer>
    </div>

    <script>
        const API_BASE = '/api';

        // Auto-detect API base if running on different domain
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            const API_BASE_PROD = window.location.origin + '/api';
        }

        async function submitForm(formId, endpoint) {
            const form = document.getElementById(formId);
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            const btn = form.querySelector('button[type="submit"]');
            const loading = form.querySelector('.loading');
            const alert = form.querySelector('.alert');

            // Disable button and show loading
            btn.disabled = true;
            loading.classList.add('show');
            alert.classList.remove('show', 'success', 'error');

            try {
                const response = await fetch(`${API_BASE}/${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                if (response.ok) {
                    alert.textContent = result.message;
                    alert.classList.add('show', 'success');
                    form.reset();
                } else {
                    alert.textContent = result.detail || 'Erreur lors de l\'envoi';
                    alert.classList.add('show', 'error');
                }
            } catch (error) {
                alert.textContent = 'Erreur de connexion: ' + error.message;
                alert.classList.add('show', 'error');
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        }

        // Contact form
        document.getElementById('contact').addEventListener('submit', (e) => {
            e.preventDefault();
            submitForm('contact', 'contact');
        });

        // Quote form
        document.getElementById('quote').addEventListener('submit', (e) => {
            e.preventDefault();
            submitForm('quote', 'quote');
        });
    </script>
</body>
</html>
